<style>
  .broadcast-grid { display: grid; grid-template-columns: 1fr 400px; gap: 28px; }
  .compose-card { padding: 32px; }
  .history-list { display: flex; flex-direction: column; gap: 12px; }
  .history-item { background: var(--panel-3); border: 1px solid var(--line-2); border-radius: var(--r); padding: 16px; transition: 0.2s; }
  .history-item:hover { border-color: var(--line-3); background: rgba(255, 255, 255, 0.04); }
  .history-item .t { font-size: 0.7rem; color: var(--txt-3); text-transform: uppercase; font-weight: 800; margin-bottom: 8px; display: flex; justify-content: space-between; }
  .history-item .m { font-size: 0.9rem; color: var(--txt-2); line-height: 1.4; white-space: pre-wrap; }
</style>

<div class="page" id="page-broadcast">
  <div class="ph">
    <div>
      <div class="title">Global Broadcast</div>
      <div class="desc">Send mass announcements to all linked users and groups across the fleet.</div>
    </div>
  </div>

  <div class="broadcast-grid">
    <div class="card compose-card">
      <div class="card-h"><div class="title">Compose Announcement</div></div>
      <div class="grid grid-2">
        <div class="field">
          <label>Origin Session</label>
          <select class="select" id="bcSession">
            <option value="__main__">Main Controller</option>
          </select>
        </div>
        <div class="field">
          <label>Target Scope</label>
          <select class="select" id="bcTarget">
            <option value="all">All Contacts & Groups</option>
            <option value="users">Individual Users Only</option>
            <option value="groups">Groups Only</option>
          </select>
        </div>
      </div>
      <div class="field mt-3">
        <label>Message Content</label>
        <textarea class="textarea" id="bcMsg" rows="8" placeholder="Type your announcement here..."></textarea>
      </div>
      
      <div class="notice mt-3">
        <strong>Fleet Warning</strong>
        Broadcasts are sent in batches to prevent number banning. Ensure your message complies with WhatsApp policies.
      </div>
      
      <div class="row mt-4" style="justify-content:flex-end">
        <button class="btn btn-primary" id="bcBtn" onclick="sendBroadcast()">Dispatch Announcement</button>
      </div>
    </div>

    <div class="stack gap-4">
      <div class="card">
        <div class="card-h">
          <div class="title">Transmission History</div>
          <button class="btn btn-ghost btn-sm" onclick="loadBroadcastHistory()">Refresh</button>
        </div>
        <div class="history-list" id="bcHistory">
          <div style="text-align:center; padding:20px; color:var(--txt-3)">No recent transmissions.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
async function loadBroadcastHistory() {
  try {
    const res = await api('/bot-api/broadcast/history');
    const wrap = document.getElementById('bcHistory');
    if (!wrap) return;
    
    if (res.length === 0) {
      wrap.innerHTML = `<div style="text-align:center; padding:20px; color:var(--txt-3)">No recent transmissions.</div>`;
      return;
    }
    
    wrap.innerHTML = res.map(h => `
      <div class="history-item">
        <div class="t">
          <span>${new Date(h.timestamp).toLocaleString()}</span>
          <span class="badge blue">${h.targetCount} RECIPIENTS</span>
        </div>
        <div class="m">${escapeHtml(h.message)}</div>
      </div>
    `).join('');
  } catch (e) { }
}

async function sendBroadcast() {
  const msg = document.getElementById('bcMsg').value;
  const session = document.getElementById('bcSession').value;
  const target = document.getElementById('bcTarget').value;
  
  if (!msg) return toast('Message cannot be empty', 'error');
  
  const btn = document.getElementById('bcBtn');
  btn.disabled = true;
  btn.textContent = 'Dispatching...';
  
  try {
    await api('/bot-api/broadcast', {
      method: 'POST',
      body: JSON.stringify({ message: msg, sessionId: session, target })
    });
    toast('Broadcast dispatch initiated successfully', 'success');
    document.getElementById('bcMsg').value = '';
    loadBroadcastHistory();
  } catch (e) { toast(e.message, 'error'); }
  finally {
    btn.disabled = false;
    btn.textContent = 'Dispatch Announcement';
  }
}

function initBroadcastTab() {
  loadBroadcastHistory();
  // Populate sessions
  const bcSess = document.getElementById('bcSession');
  if (bcSess) {
    const sessions = State.data.sessions || [];
    bcSess.innerHTML = sessions.map(s => `<option value="${s.id}">${s.name || s.id} (${s.number || 'No Link'})</option>`).join('');
  }
}

window.initBroadcastTab = initBroadcastTab;
window.sendBroadcast = sendBroadcast;
window.loadBroadcastHistory = loadBroadcastHistory;
</script>
