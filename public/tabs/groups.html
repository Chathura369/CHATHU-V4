<style>
  .group-grid { display: grid; grid-template-columns: 380px 1fr; gap: 28px; }
  .entity-list { display: flex; flex-direction: column; gap: 12px; }
  .entity-card { background: var(--grad-card); border: 1px solid var(--line-2); border-radius: var(--r); padding: 16px; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; cursor: pointer; }
  .entity-card:hover { border-color: var(--brand); background: rgba(255, 255, 255, 0.04); }
  .entity-card .info b { display: block; font-size: 0.95rem; }
  .entity-card .info span { font-size: 0.75rem; color: var(--txt-3); }
  
  .group-form { position: sticky; top: 0; }
  .group-table-card { padding: 0; overflow: hidden; border: 1px solid var(--line-2); border-radius: var(--r-lg); background: var(--panel-2); }
  .pro-table { width: 100%; border-collapse: collapse; }
  .pro-table th { background: rgba(255, 255, 255, 0.03); padding: 14px 20px; text-align: left; font-size: 0.7rem; color: var(--txt-3); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--line-3); }
  .pro-table td { padding: 16px 20px; border-bottom: 1px solid var(--line-2); font-size: 0.9rem; }
  
  .badge-pill { padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; background: rgba(255, 255, 255, 0.05); color: var(--txt-2); }
  .badge-pill.on { background: var(--brand-soft); color: var(--brand); }
</style>

<div class="page" id="page-groups">
  <div class="ph">
    <div>
      <div class="title">Group Management</div>
      <div class="desc">Configure security, automation, and access rules for WhatsApp groups.</div>
    </div>
    <div class="actions">
      <input class="input" id="groupsSearch" placeholder="Search groups..." style="width:260px" oninput="renderGroups()" />
      <button class="btn btn-secondary btn-sm" onclick="loadGroups()">Refresh</button>
    </div>
  </div>

  <div class="group-grid">
    <!-- Group Form -->
    <div class="group-form">
      <div class="card">
        <div class="card-h"><div class="title" id="groupsFormTitle">Group Configuration</div></div>
        <div class="field"><label>Group JID / Link</label><input class="input" id="groupFormJid" placeholder="1203...@g.us" /></div>
        <div class="field"><label>Friendly Name</label><input class="input" id="groupFormName" placeholder="e.g. Support Team" /></div>
        
        <div class="grid grid-2 mt-3">
          <div class="control-row" style="padding:10px">
            <div class="info" style="margin:0"><b style="font-size:0.8rem">Anti-Link</b></div>
            <span class="switch"><input type="checkbox" id="groupFormAntiLink" /><span class="slider"></span></span>
          </div>
          <div class="control-row" style="padding:10px">
            <div class="info" style="margin:0"><b style="font-size:0.8rem">Anti-Spam</b></div>
            <span class="switch"><input type="checkbox" id="groupFormAntiSpam" /><span class="slider"></span></span>
          </div>
          <div class="control-row" style="padding:10px">
            <div class="info" style="margin:0"><b style="font-size:0.8rem">Welcome</b></div>
            <span class="switch"><input type="checkbox" id="groupFormWelcome" /><span class="slider"></span></span>
          </div>
          <div class="control-row" style="padding:10px">
            <div class="info" style="margin:0"><b style="font-size:0.8rem">NSFW</b></div>
            <span class="switch"><input type="checkbox" id="groupFormNsfw" /><span class="slider"></span></span>
          </div>
        </div>
        
        <div class="row mt-4" style="justify-content:flex-end; gap:10px">
          <button class="btn btn-secondary btn-sm" onclick="resetGroupForm()">Reset</button>
          <button class="btn btn-primary btn-sm" onclick="saveGroup()">Save Rules</button>
        </div>
      </div>
    </div>

    <!-- Group Table -->
    <div class="group-table-card">
      <table class="pro-table">
        <thead>
          <tr>
            <th>Group Name</th>
            <th>Protections</th>
            <th>Status</th>
            <th style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody id="groupsTable">
          <tr><td colspan="4" style="text-align:center; padding:40px; color:var(--txt-3)">Loading group registry...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
async function loadGroups() {
  try {
    const res = await api('/bot-api/groups');
    State.data.groups = res;
    renderGroups();
  } catch (e) { toast(e.message, 'error'); }
}

function renderGroups() {
  const tb = document.getElementById('groupsTable');
  if (!tb) return;
  
  const search = document.getElementById('groupsSearch')?.value.toLowerCase() || '';
  const groups = State.data.groups || [];
  
  const filtered = groups.filter(g => (g.name || '').toLowerCase().includes(search) || g.jid.toLowerCase().includes(search));
  
  if (filtered.length === 0) {
    tb.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:40px; color:var(--txt-3)">No groups configured yet.</td></tr>`;
    return;
  }

  tb.innerHTML = filtered.map(g => `
    <tr>
      <td>
        <div style="font-weight:700">${escapeHtml(g.name || 'Unknown Group')}</div>
        <div class="text-xs dim mono">${escapeHtml(g.jid)}</div>
      </td>
      <td>
        <div style="display:flex; gap:6px">
          ${g.antiLink ? '<span class="badge-pill on">AntiLink</span>' : ''}
          ${g.antiSpam ? '<span class="badge-pill on">AntiSpam</span>' : ''}
          ${g.nsfw ? '<span class="badge-pill on">NSFW</span>' : ''}
          ${!g.antiLink && !g.antiSpam && !g.nsfw ? '<span class="badge-pill">None</span>' : ''}
        </div>
      </td>
      <td><span class="badge ${g.muted ? 'red' : 'green'}">${g.muted ? 'MUTED' : 'ACTIVE'}</span></td>
      <td style="text-align:right">
        <button class="btn btn-secondary btn-sm" onclick="editGroup('${g.jid}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteGroup('${g.jid}')">Wipe</button>
      </td>
    </tr>
  `).join('');
}

function editGroup(jid) {
  const g = (State.data.groups || []).find(x => x.jid === jid);
  if (!g) return;
  document.getElementById('groupsFormTitle').textContent = 'Editing: ' + (g.name || jid);
  document.getElementById('groupFormJid').value = g.jid;
  document.getElementById('groupFormJid').disabled = true;
  document.getElementById('groupFormName').value = g.name || '';
  document.getElementById('groupFormAntiLink').checked = !!g.antiLink;
  document.getElementById('groupFormAntiSpam').checked = !!g.antiSpam;
  document.getElementById('groupFormWelcome').checked = !!g.welcome;
  document.getElementById('groupFormNsfw').checked = !!g.nsfw;
}

function resetGroupForm() {
  document.getElementById('groupsFormTitle').textContent = 'Group Configuration';
  document.getElementById('groupFormJid').value = '';
  document.getElementById('groupFormJid').disabled = false;
  document.getElementById('groupFormName').value = '';
  document.getElementById('groupFormAntiLink').checked = false;
  document.getElementById('groupFormAntiSpam').checked = false;
  document.getElementById('groupFormWelcome').checked = false;
  document.getElementById('groupFormNsfw').checked = false;
}

async function saveGroup() {
  const jid = document.getElementById('groupFormJid').value.trim();
  if (!jid) return toast('JID or Link is required', 'error');
  
  const payload = {
    jid,
    name: document.getElementById('groupFormName').value,
    antiLink: document.getElementById('groupFormAntiLink').checked,
    antiSpam: document.getElementById('groupFormAntiSpam').checked,
    welcome: document.getElementById('groupFormWelcome').checked,
    nsfw: document.getElementById('groupFormNsfw').checked
  };

  try {
    await api('/bot-api/groups/upsert', {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    toast('Group rules updated', 'success');
    loadGroups();
    resetGroupForm();
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteGroup(jid) {
  if (!await confirmDialog('Wipe rules for this group?', { okText: 'Wipe', danger: true })) return;
  try {
    await api('/bot-api/groups/' + encodeURIComponent(jid), { method: 'DELETE' });
    toast('Rules wiped', 'success');
    loadGroups();
  } catch (e) { toast(e.message, 'error'); }
}

function initGroupsTab() {
  loadGroups();
}

window.initGroupsTab = initGroupsTab;
window.renderGroups = renderGroups;
window.editGroup = editGroup;
window.saveGroup = saveGroup;
window.resetGroupForm = resetGroupForm;
window.deleteGroup = deleteGroup;
</script>
