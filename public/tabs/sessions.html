<style>
  .sessions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
  .session-card {
    background: var(--grad-card);
    border: 1px solid var(--line-2);
    border-radius: var(--r-lg);
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
    box-shadow: var(--shadow-sm);
  }
  .session-card:hover { border-color: var(--brand); transform: translateY(-5px); box-shadow: var(--shadow); }
  .session-card .h { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .session-card .icon { width: 48px; height: 48px; border-radius: 14px; background: var(--panel-3); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--brand); border: 1px solid var(--line-3); }
  .session-card .title { font-weight: 700; font-size: 1.1rem; color: var(--txt); }
  .session-card .status { font-size: 0.75rem; font-weight: 800; letter-spacing: 1px; margin-top: 4px; }
  .session-card .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .session-card .meta-item { background: rgba(255, 255, 255, 0.02); padding: 10px; border-radius: 12px; border: 1px solid var(--line-2); }
  .session-card .meta-item .l { font-size: 0.6rem; color: var(--txt-3); text-transform: uppercase; font-weight: 800; margin-bottom: 4px; }
  .session-card .meta-item .v { font-size: 0.9rem; font-weight: 700; color: var(--txt-2); }
  
  .session-card .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
</style>

<div class="page" id="page-sessions">
  <div class="ph">
    <div>
      <div class="title">Bot Sessions</div>
      <div class="desc">Link and manage your WhatsApp devices to the central core.</div>
    </div>
    <div class="actions">
      <button class="btn btn-secondary btn-sm" onclick="loadSessions()">Refresh</button>
      <button class="btn btn-primary btn-sm" onclick="openAddSession()">+ Add Device</button>
    </div>
  </div>

  <div class="sessions-grid" id="sessionsGrid">
    <!-- Sessions will be injected here -->
  </div>
</div>

<script>
async function renderSessions() {
  const grid = document.getElementById('sessionsGrid');
  if (!grid) return;
  
  const sessions = State.data.sessions || [];
  if (sessions.length === 0) {
    grid.innerHTML = `<div class="card" style="grid-column: 1/-1; text-align:center; padding:60px">
      <div style="font-size:3rem; margin-bottom:20px; opacity:0.3">📱</div>
      <div class="title">No Active Sessions</div>
      <p class="desc">Add your first WhatsApp device to start using the bot.</p>
      <button class="btn btn-primary mt-4" onclick="openAddSession()">+ Add My First Device</button>
    </div>`;
    return;
  }

  grid.innerHTML = sessions.map(s => {
    const connected = s.status === 'connected';
    const isMain = s.id === '__main__';
    const uptime = getSessionAgeSeconds(s);
    
    return `<div class="session-card">
      <div class="h">
        <div class="icon">${isMain ? '👑' : '🤖'}</div>
        <div>
          <div class="title">${escapeHtml(s.name || (isMain ? 'Main Controller' : 'Sub Bot'))}</div>
          <div class="status" style="color: ${connected ? 'var(--brand)' : 'var(--warn)'}">${(s.status || 'OFFLINE').toUpperCase()}</div>
        </div>
        ${isMain ? '<span class="badge violet" style="margin-left:auto">MASTER</span>' : ''}
      </div>
      
      <div class="meta">
        <div class="meta-item"><div class="l">Linked Number</div><div class="v mono">${s.number || '--'}</div></div>
        <div class="meta-item"><div class="l">Uptime</div><div class="v">${uptime > 0 ? fmtUptime(uptime) : '--'}</div></div>
        <div class="meta-item"><div class="l">Processed</div><div class="v mono">${s.processedCount || 0}</div></div>
        <div class="meta-item"><div class="l">Work Mode</div><div class="v badge blue" style="padding:2px 6px">${(s.workMode || 'public').toUpperCase()}</div></div>
      </div>
      
      <div class="actions">
        <button class="btn btn-secondary btn-sm" onclick="openBotSettings('${s.id}')">Configure</button>
        ${connected 
          ? `<button class="btn btn-danger btn-sm" onclick="disconnectSession('${s.id}')">Disconnect</button>`
          : `<button class="btn btn-primary btn-sm" onclick="openQrFor('${s.id}')">Scan QR</button>`
        }
      </div>
    </div>`;
  }).join('');
}

function initSessionsTab() {
  renderSessions();
}

window.initSessionsTab = initSessionsTab;
window.renderSessions = renderSessions;
</script>
