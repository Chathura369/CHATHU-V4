<style>
  .cmd-toolbar { background: var(--panel-3); padding: 20px; border-radius: var(--r); border: 1px solid var(--line-2); display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
  .cmd-search { flex: 1; position: relative; }
  .cmd-search .input { padding-left: 40px; background: rgba(0, 0, 0, 0.2); }
  .cmd-search i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
  
  .cmd-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .cmd-chip { padding: 8px 16px; border-radius: 12px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--line-2); font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
  .cmd-chip:hover { background: rgba(255, 255, 255, 0.06); border-color: var(--line-3); }
  .cmd-chip.active { background: var(--brand-soft); border-color: var(--brand); color: var(--brand); }
  
  .cmd-table-card { padding: 0; overflow: hidden; border: 1px solid var(--line-2); border-radius: var(--r-lg); background: var(--panel-2); }
  .pro-table { width: 100%; border-collapse: collapse; }
  .pro-table th { background: rgba(255, 255, 255, 0.03); padding: 14px 20px; text-align: left; font-size: 0.7rem; color: var(--txt-3); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--line-3); }
  .pro-table td { padding: 16px 20px; border-bottom: 1px solid var(--line-2); }
  
  .cmd-name { font-weight: 800; font-family: 'JetBrains Mono', monospace; color: var(--brand); font-size: 1rem; }
  .cmd-desc { font-size: 0.85rem; color: var(--txt-2); margin-top: 4px; }
</style>

<div class="page" id="page-commands">
  <div class="ph">
    <div>
      <div class="title">Command Matrix</div>
      <div class="desc">Global command registry and access control policies.</div>
    </div>
    <div class="actions">
       <button class="btn btn-secondary btn-sm" onclick="loadCommands()">Sync Catalog</button>
    </div>
  </div>

  <div class="cmd-toolbar">
    <div class="cmd-search">
      <i class="ic" style="-webkit-mask-image:url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22currentColor%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><circle cx=%2211%22 cy=%2211%22 r=%228%22/><line x1=%2221%22 y1=%2221%22 x2=%2216.65%22 y2=%2216.65%22/></svg>')"></i>
      <input class="input" id="cmdsSearch" placeholder="Search commands, categories or descriptions..." oninput="renderCommands()" />
    </div>
    <select class="select" id="cmdStatusFilter" style="width:180px" onchange="renderCommands()">
      <option value="all">All States</option>
      <option value="enabled">Enabled Only</option>
      <option value="disabled">Disabled Only</option>
    </select>
  </div>

  <div class="cmd-chips" id="cmdCategoryChips">
    <!-- Categories will be injected here -->
  </div>

  <div class="cmd-table-card">
    <table class="pro-table">
      <thead>
        <tr>
          <th>Command Identity</th>
          <th>Category</th>
          <th>Permission</th>
          <th style="text-align:right">Status</th>
        </tr>
      </thead>
      <tbody id="cmdsTable">
        <tr><td colspan="4" style="text-align:center; padding:40px; color:var(--txt-3)">Synchronizing command catalog...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
async function loadCommands() {
  try {
    const res = await api('/bot-api/commands');
    State.data.commands = res;
    renderCommands();
  } catch (e) { toast(e.message, 'error'); }
}

function renderCommands() {
  const tb = document.getElementById('cmdsTable');
  const chipWrap = document.getElementById('cmdCategoryChips');
  if (!tb) return;
  
  const search = document.getElementById('cmdsSearch')?.value.toLowerCase() || '';
  const filter = document.getElementById('cmdStatusFilter')?.value || 'all';
  const cmds = State.data.commands || [];
  
  const categories = ['all', ...new Set(cmds.map(c => c.category))];
  if (chipWrap) {
    const activeCat = State.activeCmdCategory || 'all';
    chipWrap.innerHTML = categories.map(cat => `
      <div class="cmd-chip ${activeCat === cat ? 'active' : ''}" onclick="setCmdCategory('${cat}')">
        ${cat.toUpperCase()}
      </div>
    `).join('');
  }

  const filtered = cmds.filter(c => {
    const matchesSearch = c.name.toLowerCase().includes(search) || (c.description || '').toLowerCase().includes(search) || c.category.toLowerCase().includes(search);
    const matchesCat = (State.activeCmdCategory || 'all') === 'all' || c.category === State.activeCmdCategory;
    const matchesStatus = filter === 'all' || (filter === 'enabled' ? !c.disabled : c.disabled);
    return matchesSearch && matchesCat && matchesStatus;
  });

  if (filtered.length === 0) {
    tb.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:40px; color:var(--txt-3)">No commands found matching criteria.</td></tr>`;
    return;
  }

  tb.innerHTML = filtered.map(c => `
    <tr>
      <td>
        <div class="cmd-name">.${c.name}</div>
        <div class="cmd-desc">${escapeHtml(c.description || 'No description provided.')}</div>
      </td>
      <td><span class="badge blue">${c.category.toUpperCase()}</span></td>
      <td><span class="text-xs dim mono">${(c.permission || 'everyone').toUpperCase()}</span></td>
      <td style="text-align:right">
        <span class="switch"><input type="checkbox" ${!c.disabled ? 'checked' : ''} onchange="toggleCommand('${c.name}', this.checked)" /><span class="slider"></span></span>
      </td>
    </tr>
  `).join('');
}

function setCmdCategory(cat) {
  State.activeCmdCategory = cat;
  renderCommands();
}

async function toggleCommand(name, enabled) {
  try {
    await api(`/bot-api/commands/${name}/toggle`, {
      method: 'POST',
      body: JSON.stringify({ enabled })
    });
    const cmd = State.data.commands.find(c => c.name === name);
    if (cmd) cmd.disabled = !enabled;
    toast(`Command .${name} ${enabled ? 'enabled' : 'disabled'}`, 'success');
  } catch (e) { 
    toast(e.message, 'error');
    renderCommands();
  }
}

function initCommandsTab() {
  loadCommands();
}

window.initCommandsTab = initCommandsTab;
window.renderCommands = renderCommands;
window.setCmdCategory = setCmdCategory;
window.toggleCommand = toggleCommand;
</script>
